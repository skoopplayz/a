<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>music</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet" />
    <style>
      :root {
        --bg-start: #0a1a2e;
        --bg-end: #1a2a4e;
        --highlight: #ffffff;
        --accent: #3b82f6;
        --glass-bg: rgba(10, 26, 46, 0.75);
        --glass-border: rgba(255, 255, 255, 0.1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: var(--highlight);
        padding: 20px;
        overflow-x: hidden;
      }

      .god-rays {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 550px;
        --stripes: repeating-linear-gradient(
          100deg,
          rgba(20, 40, 60, 0.8) 0%,
          rgba(20, 40, 60, 0.8) 7%,
          transparent 10%,
          transparent 12%,
          rgba(20, 40, 60, 0.8) 16%
        );
        --rays: repeating-linear-gradient(
          100deg,
          rgba(30, 50, 90, 0.9) 10%,
          rgba(20, 40, 80, 0.9) 15%,
          rgba(30, 50, 90, 0.9) 20%,
          rgba(20, 40, 80, 0.9) 25%,
          rgba(30, 50, 90, 0.9) 30%
        );
        background-image: var(--stripes), var(--rays);
        background-size: 300%, 200%;
        background-position: 50% 50%, 50% 50%;
        animation: fadeIn 2s ease;
        mask-image: radial-gradient(ellipse at 100% 0%, rgba(255, 255, 255, 0) 40%, transparent 70%);
        -webkit-mask-image: radial-gradient(ellipse at 100% 0%, white 40%, transparent 70%);
        pointer-events: none;
        z-index: -1;
      }

      .god-rays::after {
        content: '';
        position: absolute;
        inset: 0;
        background-image: var(--stripes), var(--rays);
        background-size: 200%, 100%;
        animation: god-rays 40s linear infinite;
        background-attachment: fixed;
        mix-blend-mode: difference;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes god-rays {
        0% { background-position: 0% 0%, 0% 0%; }
        100% { background-position: 400% 400%, 400% 400%; }
      }

      /* Search Header Styles */
      .header-search {
        width: 100%;
        max-width: 560px;
        margin-bottom: 30px;
        position: relative;
        z-index: 100;
      }

      .search-container {
        width: 100%;
        border: 1px solid var(--glass-border);
        border-radius: 12px;
      }

      .search-input {
        width: 100%;
        padding: 14px 20px;
        border-radius: 12px;
        border: none;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--highlight);
        outline: none;
        transition: all 0.2s ease;
        backdrop-filter: blur(5px);
      }

      .search-input::placeholder {
        color: rgba(255, 255, 255, 0.5);
      }

      .search-input:focus {
        background: rgba(255, 255, 255, 0.15);
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
      }

      .search-results {
        width: 100%;
        max-height: 350px;
        background: rgba(10, 26, 46, 0.95);
        backdrop-filter: blur(15px);
        border-radius: 12px;
        overflow-y: auto;
        opacity: 0;
        transform: translateY(-10px);
        visibility: hidden;
        transition: all 0.2s ease;
        z-index: 99;
        position: absolute;
        top: 60px;
        left: 0;
        border: 1px solid var(--glass-border);
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      }

      .search-results.active {
        opacity: 1;
        transform: translateY(0);
        visibility: visible;
      }

      .result-item {
        display: flex;
        align-items: center;
        padding: 12px 16px;
        cursor: pointer;
        transition: background 0.2s;
      }

      .result-item:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .result-img {
        width: 46px;
        height: 46px;
        border-radius: 6px;
        overflow: hidden;
        margin-right: 14px;
        flex-shrink: 0;
        background: rgba(255,255,255,0.05);
      }

      .result-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .result-info {
        flex: 1;
        min-width: 0;
      }

      .result-title {
        font-weight: 600;
        margin-bottom: 4px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--highlight);
        font-size: 14px;
      }

      .result-artist {
        font-size: 12px;
        opacity: 0.6;
        color: var(--highlight);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* 3-Column Reworked Grid Layout */
      .main-container {
        display: grid;
        grid-template-columns: 300px 1fr 300px;
        gap: 24px;
        width: 100%;
        max-width: 1300px;
        min-height: 560px;
        z-index: 10;
      }

      /* Side Panels Base Layout */
      .side-panel {
        background: var(--glass-bg);
        border-radius: 16px;
        padding: 20px;
        backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        display: flex;
        flex-direction: column;
        max-height: 580px;
        overflow-y: auto;
      }

      .side-panel::-webkit-scrollbar {
        width: 5px;
      }
      .side-panel::-webkit-scrollbar-track {
        background: transparent;
      }
      .side-panel::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 10px;
      }

      .panel-title {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.9);
      }

      .panel-title i {
        color: var(--accent);
      }

      /* List Items UI styling */
      .track-item-row {
        display: flex;
        align-items: center;
        padding: 10px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
        margin-bottom: 8px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.03);
      }

      .track-item-row:hover {
        background: rgba(255, 255, 255, 0.08);
        transform: translateY(-1px);
      }

      .track-item-row .result-img {
        width: 38px;
        height: 38px;
        margin-right: 10px;
      }

      .track-item-row .result-title {
        font-size: 13px;
      }

      .track-item-row .result-artist {
        font-size: 11px;
      }

      .row-actions {
        display: flex;
        gap: 8px;
        opacity: 0.6;
        margin-left: auto;
      }

      .row-actions i:hover {
        opacity: 1;
        color: var(--accent);
      }
      .row-actions i.remove-btn:hover {
        color: #ef4444;
      }

      /* Playlists Specific Styles */
      .playlist-creator {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }

      .playlist-input {
        flex: 1;
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        padding: 8px 12px;
        color: white;
        font-size: 13px;
        outline: none;
      }

      .create-pl-btn {
        background: var(--accent);
        border: none;
        color: white;
        padding: 8px 12px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .playlist-node {
        margin-bottom: 14px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        padding-bottom: 8px;
      }

      .playlist-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 6px;
        color: rgba(255,255,255,0.85);
      }

      .playlist-header div {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .playlist-tracks {
        padding-left: 8px;
      }

      /* Center Player Hub Styles */
      .player-hub {
        background: var(--glass-bg);
        border-radius: 20px;
        padding: 30px;
        backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .album-art {
        width: 260px;
        height: 260px;
        border-radius: 16px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.05);
        position: relative;
        box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        margin-bottom: 24px;
        border: 1px solid rgba(255,255,255,0.1);
      }

      .album-art i {
        font-size: 100px;
        color: rgba(255, 255, 255, 0.2);
        position: absolute;
      }

      .album-art img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        position: relative;
        z-index: 1;
      }

      .info-panel {
        width: 100%;
        text-align: center;
        position: relative;
      }

      .track-title {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 6px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--highlight);
      }

      .artist {
        font-size: 15px;
        opacity: 0.6;
        margin-bottom: 24px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Playback controls Rework */
      .controls {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        margin-bottom: 20px;
      }

      .control-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .controls i {
        font-size: 18px;
        cursor: pointer;
        transition: all 0.2s ease;
        opacity: 0.75;
        color: var(--highlight);
        padding: 10px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.06);
        width: 42px;
        height: 42px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .controls i:hover {
        opacity: 1;
        background: rgba(255, 255, 255, 0.15);
        color: var(--accent);
      }

      .controls i:active {
        transform: scale(0.95);
      }

      .controls i#playPause {
        font-size: 22px;
        width: 56px;
        height: 56px;
        background: var(--highlight);
        color: var(--bg-start);
        opacity: 1;
      }

      .controls i#playPause:hover {
        transform: scale(1.05);
        background: var(--highlight);
        color: var(--accent);
      }

      .controls i.active-toggle {
        color: var(--accent);
        opacity: 1;
        background: rgba(59, 130, 246, 0.2);
      }

      /* Add to Playlist Dropdown option */
      .playlist-add-container {
        position: relative;
      }

      .playlist-dropdown {
        position: absolute;
        bottom: 50px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(15, 32, 59, 0.95);
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        padding: 6px 0;
        min-width: 150px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        z-index: 50;
        display: none;
        max-height: 150px;
        overflow-y: auto;
      }

      .playlist-dropdown.show {
        display: block;
      }

      .playlist-dropdown-item {
        padding: 8px 14px;
        font-size: 12px;
        text-align: left;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .playlist-dropdown-item:hover {
        background: rgba(255,255,255,0.1);
        color: var(--accent);
      }

      /* Seekbar Layout */
      .seekbar-container {
        width: 100%;
        margin-bottom: 6px;
      }

      .seekbar {
        height: 5px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 6px;
        position: relative;
        cursor: pointer;
        transition: height 0.2s ease;
      }

      .seekbar:hover {
        height: 7px;
      }

      #progress {
        height: 100%;
        width: 0%;
        background: var(--accent);
        border-radius: 6px;
        position: relative;
      }

      .timecodes {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        opacity: 0.5;
        color: var(--highlight);
      }

      /* Header/Utility buttons styling */
      .panel-action-btn {
        width: 100%;
        padding: 10px;
        font-size: 13px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        color: var(--highlight);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin-bottom: 14px;
        font-weight: 500;
        transition: background 0.2s;
      }

      .panel-action-btn:hover {
        background: rgba(255, 255, 255, 0.12);
      }

      #ytPlayer {
        position: absolute;
        top: 0;
        left: 0;
        width: 1px;
        height: 1px;
        opacity: 0.001;
        pointer-events: none;
      }

      .loading, .error-message, .empty-state {
        text-align: center;
        padding: 12px;
        font-size: 12px;
        opacity: 0.6;
      }
      
      .error-message { color: #ef4444; opacity: 1; }

      @media (max-width: 1024px) {
        .main-container {
          grid-template-columns: 1fr;
        }
        .side-panel {
          max-height: 400px;
        }
      }
    </style>
  </head>

  <body>
    <div class="god-rays"></div>
    
    <div class="header-search">
      <div class="search-container">
        <input type="text" class="search-input" placeholder="Search for any song..." id="searchInput" autocomplete="off" />
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>

    <div class="main-container">
      
      <div class="side-panel">
        <div class="panel-title"><i class="ri-playlist-music-line"></i> Playlists</div>
        <div class="playlist-creator">
          <input type="text" class="playlist-input" placeholder="New playlist title..." id="playlistInput">
          <button class="create-pl-btn" id="createPlaylistBtn"><i class="ri-add-line"></i></button>
        </div>
        <div id="playlistsContent"></div>
      </div>

      <div class="player-hub">
        <div class="album-art">
          <i class="ri-music-2-line" id="musicIcon"></i>
          <img src="" alt="Album" id="albumCover" crossorigin="anonymous" style="display: none" />
        </div>
        
        <div class="info-panel">
          <div class="track-title" id="trackTitle">Not Playing</div>
          <div class="artist" id="artistName">Search for a track to begin</div>
          
          <div class="controls">
            <div class="control-row">
              <i id="backward10" class="ri-skip-back-mini-line"></i>
              <i id="backward5" class="ri-arrow-left-s-line"></i>
              <i id="playPause" class="ri-play-fill"></i>
              <i id="forward5" class="ri-arrow-right-s-line"></i>
              <i id="forward10" class="ri-skip-forward-mini-line"></i>
            </div>
            <div class="control-row">
              <i id="loopToggle" class="ri-repeat-line"></i>
              <i id="volumeBtn" class="ri-volume-up-line"></i>
              <i id="favoriteBtn" class="ri-heart-line"></i>
              
              <div class="playlist-add-container">
                <i id="addToPlaylistBtn" class="ri-add-box-line"></i>
                <div class="playlist-dropdown" id="playlistDropdown"></div>
              </div>
            </div>
          </div>
          
          <div class="seekbar-container">
            <div id="seekbar" class="seekbar">
              <div id="progress"></div>
            </div>
          </div>
          <div class="timecodes">
            <span id="currentTime">0:00</span>
            <span id="remainingTime">-0:00</span>
          </div>
        </div>
      </div>

      <div class="side-panel">
        <div class="panel-title"><i class="ri-star-line"></i> Favorites</div>
        <button class="panel-action-btn" id="playFavoritesBtn"><i class="ri-play-circle-line"></i> Play Favorites</button>
        <div id="favoritesColumn"></div>
      </div>

    </div>

    <div id="ytPlayer"></div>

    <script>
      const YT_KEY = 'AIzaSyBQpYqy6P7hBtUCoTPJCEVjZKx5BzB-ItU';
      const SEARCH_EP = 'https://itunes.apple.com/search?term=';
      
      const searchInput = document.querySelector('#searchInput');
      const searchResults = document.querySelector('#searchResults');
      const trackTitle = document.querySelector('#trackTitle');
      const artistName = document.querySelector('#artistName');
      const albumCover = document.querySelector('#albumCover');
      const musicIcon = document.querySelector('#musicIcon');
      const playPauseBtn = document.querySelector('#playPause');
      const volumeBtn = document.querySelector('#volumeBtn');
      const seekBar = document.querySelector('#seekbar');
      const progressBar = document.querySelector('#progress');
      const currentTimeSpan = document.querySelector('#currentTime');
      const remainingTimeSpan = document.querySelector('#remainingTime');
      const favoriteBtn = document.querySelector('#favoriteBtn');
      const favoritesColumn = document.querySelector('#favoritesColumn');
      const playFavoritesBtn = document.querySelector('#playFavoritesBtn');
      
      const playlistInput = document.querySelector('#playlistInput');
      const createPlaylistBtn = document.querySelector('#createPlaylistBtn');
      const playlistsContent = document.querySelector('#playlistsContent');
      const addToPlaylistBtn = document.querySelector('#addToPlaylistBtn');
      const playlistDropdown = document.querySelector('#playlistDropdown');

      let isMuted = false;
      let player = null;
      let isPlaying = false;
      let isDragging = false;
      let searchTimeout;
      let playerReady = false;
      
      let currentTrack = { title: 'Not Playing', artist: '', artwork: '', genre: '' };
      let isFavorite = false;
      let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
      let playlists = JSON.parse(localStorage.getItem('playlists')) || {};
      let currentFavoriteIndex = -1;
      let isLooping = false;
      
      async function loadYouTubeAPI(retries = 3, delay = 2000) {
        return new Promise((resolve, reject) => {
          if (window.YT && window.YT.Player) {
            resolve();
            return;
          }
          const tag = document.createElement('script');
          tag.src = 'https://www.youtube.com/iframe_api';
          tag.onerror = () => {
            if (retries > 0) {
              setTimeout(() => loadYouTubeAPI(retries - 1, delay), delay);
            } else {
              reject(new Error('Failed to load YouTube API'));
            }
          };
          const firstScriptTag = document.getElementsByTagName('script')[0];
          firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
          window.onYouTubeIframeAPIReady = () => resolve();
        });
      }
      
      async function initPlayer() {
        try {
          await loadYouTubeAPI();
          player = new window.YT.Player('ytPlayer', {
            height: '1',
            width: '1',
            videoId: '',
            host: 'https://www.youtube-nocookie.com',
            playerVars: {
              playsinline: 1,
              enablejsapi: 1,
              modestbranding: 1,
              rel: 0,
              showinfo: 0,
              autoplay: 0
            },
            events: {
              onReady: () => {
                playerReady = true;
                playPauseBtn.addEventListener('click', togglePlayback);
                volumeBtn.addEventListener('click', toggleMute);
                seekBar.addEventListener('mousedown', startSeek);
                document.addEventListener('mousemove', dragSeek);
                document.addEventListener('mouseup', endSeek);
                setInterval(updateProgress, 500);
              },
              onStateChange: (event) => {
                if (event.data === window.YT.PlayerState.PLAYING) {
                  isPlaying = true;
                  playPauseBtn.className = 'ri-pause-fill';
                } else if (event.data === window.YT.PlayerState.PAUSED || event.data === window.YT.PlayerState.ENDED) {
                  isPlaying = false;
                  playPauseBtn.className = 'ri-play-fill';
                }
                if (event.data === window.YT.PlayerState.ENDED && isLooping) {
                  player.seekTo(0);
                  player.playVideo();
                } else if (event.data === window.YT.PlayerState.ENDED && currentFavoriteIndex >= 0 && currentFavoriteIndex < favorites.length - 1) {
                  playNextFavorite();
                }
              },
              onError: () => {
                searchResults.innerHTML = '<div class="error-message">Failed to load video context.</div>';
              }
            }
          });
        } catch (error) {
          searchResults.innerHTML = '<div class="error-message">Unable to initialize player backend.</div>';
        }
      }
      
      function toggleMute() {
        if (!player || !playerReady) return;
        if (isMuted) {
          player.unMute();
          volumeBtn.className = 'ri-volume-up-line';
          isMuted = false;
        } else {
          player.mute();
          volumeBtn.className = 'ri-volume-mute-line';
          isMuted = true;
        }
      }
      
      searchInput.addEventListener('input', function () {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          const query = searchInput.value.trim();
          if (query.length > 1) {
            searchSongs(query);
          } else {
            hideSearchResults();
          }
        }, 500);
      });
      
      async function searchSongs(query) {
        searchResults.innerHTML = '<div class="loading">Searching ecosystem...</div>';
        showSearchResults();
        const url = `${SEARCH_EP}${encodeURIComponent(query)}&media=music&limit=10`;
        try {
          const response = await fetch(url);
          const data = await response.json();
          displaySearchResults(data.results);
        } catch (error) {
          searchResults.innerHTML = '<div class="error-message">Search failed.</div>';
        }
      }
      
      function displaySearchResults(results) {
        if (!results || results.length === 0) {
          searchResults.innerHTML = '<div class="loading">No records discovered</div>';
          return;
        }
        searchResults.innerHTML = '';
        results.forEach((item) => {
          if (!item.trackName || !item.artistName) return;
          const resultElement = document.createElement('div');
          resultElement.className = 'result-item';
          resultElement.innerHTML = `
            <div class="result-img">
              <img src="${item.artworkUrl100}" alt="${item.trackName}" crossorigin="anonymous">
            </div>
            <div class="result-info">
              <div class="result-title">${item.trackName}</div>
              <div class="result-artist">${item.artistName}</div>
            </div>
          `;
          resultElement.addEventListener('click', () => {
            playSong(item.trackName, item.artistName, item.artworkUrl100, item.primaryGenreName);
            hideSearchResults();
            searchInput.value = '';
            currentFavoriteIndex = -1;
          });
          searchResults.appendChild(resultElement);
        });
      }
      
      function showSearchResults() { searchResults.classList.add('active'); }
      function hideSearchResults() { searchResults.classList.remove('active'); }
      
      function playSong(title, artist, artwork, genre = '') {
        trackTitle.textContent = title;
        artistName.textContent = artist;
        albumCover.src = artwork.replace('100x100', '600x600');
        albumCover.style.display = 'block';
        musicIcon.style.display = 'none';
        
        currentTrack = { title, artist, artwork, genre };
        localStorage.setItem('lastPlayed', JSON.stringify(currentTrack));
        
        isFavorite = favorites.some((fav) => fav.title === title && fav.artist === artist);
        favoriteBtn.className = isFavorite ? 'ri-heart-fill active-toggle' : 'ri-heart-line';
        
        isPlaying = false;
        playPauseBtn.className = 'ri-play-fill';
        
        const searchQuery = `${title} ${artist}`;
        getYT(searchQuery);
      }
      
      function getYT(query) {
        const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&key=${YT_KEY}&type=video&maxResults=1`;
        fetch(url)
          .then((response) => response.json())
          .then((data) => {
            if (data.items && data.items.length > 0) {
              loadVid(data.items[0].id.videoId);
            } else {
              searchResults.innerHTML = '<div class="error-message">No matching video stream found.</div>';
            }
          })
          .catch(() => {
            searchResults.innerHTML = '<div class="error-message">Video indexing failed.</div>';
          });
      }
      
      function loadVid(videoId) {
        if (player && playerReady && player.loadVideoById) {
          player.loadVideoById(videoId);
          isPlaying = false;
          playPauseBtn.className = 'ri-play-fill';
        } else {
          initPlayer().then(() => {
            if (player && playerReady && player.loadVideoById) {
              player.loadVideoById(videoId);
              isPlaying = false;
              playPauseBtn.className = 'ri-play-fill';
            }
          });
        }
      }
      
      function togglePlayback() {
        if (!player || !playerReady) return;
        if (isPlaying) {
          player.pauseVideo();
        } else {
          player.playVideo();
        }
      }
      
      function startSeek(e) {
        if (!player || !playerReady) return;
        isDragging = true;
        updateSeekPosition(e);
      }
      
      function dragSeek(e) {
        if (isDragging) updateSeekPosition(e);
      }
      
      function endSeek() {
        isDragging = false;
      }
      
      function updateSeekPosition(e) {
        if (!player || !playerReady || !player.getDuration) return;
        const rect = seekBar.getBoundingClientRect();
        const position = (e.clientX - rect.left) / rect.width;
        const percent = Math.min(Math.max(position, 0), 1);
        progressBar.style.width = percent * 100 + '%';
        const duration = player.getDuration();
        player.seekTo(percent * duration, true);
      }
      
      function updateProgress() {
        if (!player || !playerReady || !player.getDuration || isDragging) return;
        try {
          const duration = player.getDuration() || 0;
          const currentTime = player.getCurrentTime() || 0;
          const percent = (currentTime / duration) * 100;
          progressBar.style.width = percent + '%';
          currentTimeSpan.textContent = formatTime(currentTime);
          remainingTimeSpan.textContent = '-' + formatTime(duration - currentTime);
        } catch (error) {}
      }
      
      function formatTime(seconds) {
        const minutes = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60).toString().padStart(2, '0');
        return `${minutes}:${secs}`;
      }
      
      // Fixed and Functional Favorites System Code block
      favoriteBtn.addEventListener('click', () => {
        if (currentTrack.title === 'Not Playing') return;
        if (favorites.length >= 10 && !isFavorite) {
          alert('Maximum 10 favorites allowed!');
          return;
        }
        
        if (isFavorite) {
          favorites = favorites.filter((fav) => !(fav.title === currentTrack.title && fav.artist === currentTrack.artist));
        } else {
          favorites.push({ ...currentTrack });
        }
        localStorage.setItem('favorites', JSON.stringify(favorites));
        isFavorite = !isFavorite;
        favoriteBtn.className = isFavorite ? 'ri-heart-fill active-toggle' : 'ri-heart-line';
        updateFavoritesList();
      });
      
      playFavoritesBtn.addEventListener('click', playFavorites);
      
      function updateFavoritesList() {
        if(favorites.length === 0) {
          favoritesColumn.innerHTML = '<div class="empty-state">No favorite songs added yet.</div>';
          return;
        }
        favoritesColumn.innerHTML = favorites.map((fav, index) => {
          return `
            <div class="track-item-row" onclick="playFavoriteTrack(${index})">
              <div class="result-img">
                <img src="${fav.artwork}" alt="${fav.title}">
              </div>
              <div class="result-info">
                <div class="result-title">${fav.title}</div>
                <div class="result-artist">${fav.artist}</div>
              </div>
              <div class="row-actions">
                <i class="ri-arrow-left-s-line" title="Prev" onclick="event.stopPropagation(); skipFavoritePrev(${index})"></i>
                <i class="ri-arrow-right-s-line" title="Next" onclick="event.stopPropagation(); skipFavoriteNext(${index})"></i>
                <i class="ri-close-line remove-btn" title="Remove" onclick="event.stopPropagation(); removeFavorite('${fav.title.replace(/'/g, "\\'")}', '${fav.artist.replace(/'/g, "\\'")}')"></i>
              </div>
            </div>
          `;
        }).join('');
      }

      function playFavoriteTrack(index) {
        currentFavoriteIndex = index;
        const track = favorites[index];
        playSong(track.title, track.artist, track.artwork, track.genre);
      }
      
      function removeFavorite(title, artist) {
        favorites = favorites.filter((fav) => !(fav.title === title && fav.artist === artist));
        localStorage.setItem('favorites', JSON.stringify(favorites));
        if (currentTrack.title === title && currentTrack.artist === artist) {
          isFavorite = false;
          favoriteBtn.className = 'ri-heart-line';
        }
        updateFavoritesList();
      }
      
      function skipFavoritePrev(index) {
        let newIndex = index - 1;
        if (newIndex < 0) newIndex = favorites.length - 1;
        playFavoriteTrack(newIndex);
      }
      
      function skipFavoriteNext(index) {
        let newIndex = index + 1;
        if (newIndex >= favorites.length) newIndex = 0;
        playFavoriteTrack(newIndex);
      }
      
      function playFavorites() {
        if (favorites.length === 0) return;
        playFavoriteTrack(0);
      }
      
      function playNextFavorite() {
        if (currentFavoriteIndex < favorites.length - 1) {
          playFavoriteTrack(currentFavoriteIndex + 1);
        } else {
          playFavoriteTrack(0);
        }
      }

      // Playlists Feature Logic
      createPlaylistBtn.addEventListener('click', () => {
        const name = playlistInput.value.trim();
        if (!name) return;
        if (playlists[name]) {
          alert('A playlist with this name already exists.');
          return;
        }
        playlists[name] = [];
        localStorage.setItem('playlists', JSON.stringify(playlists));
        playlistInput.value = '';
        updatePlaylistsUI();
      });

      function updatePlaylistsUI() {
        const keys = Object.keys(playlists);
        if (keys.length === 0) {
          playlistsContent.innerHTML = '<div class="empty-state">No custom playlists created.</div>';
          return;
        }

        playlistsContent.innerHTML = keys.map(playlistName => {
          const tracksHTML = playlists[playlistName].map((track, index) => `
            <div class="track-item-row" onclick="playPlaylistTrack('${playlistName.replace(/'/g, "\\'")}', ${index})">
              <div class="result-img">
                <img src="${track.artwork}" alt="${track.title}">
              </div>
              <div class="result-info">
                <div class="result-title">${track.title}</div>
                <div class="result-artist">${track.artist}</div>
              </div>
              <div class="row-actions">
                <i class="ri-delete-bin-7-line remove-btn" title="Remove track" onclick="event.stopPropagation(); removeTrackFromPlaylist('${playlistName.replace(/'/g, "\\'")}', ${index})"></i>
              </div>
            </div>
          `).join('');

          return `
            <div class="playlist-node">
              <div class="playlist-header">
                <div><i class="ri-folder-music-line"></i> ${playlistName}</div>
                <div class="row-actions">
                  <i class="ri-delete-bin-line remove-btn" title="Delete Playlist" onclick="event.stopPropagation(); deletePlaylist('${playlistName.replace(/'/g, "\\'")}')"></i>
                </div>
              </div>
              <div class="playlist-tracks">
                ${tracksHTML || '<div class="empty-state" style="padding:4px;">No songs</div>'}
              </div>
            </div>
          `;
        }).join('');
      }

      function deletePlaylist(name) {
        if (confirm(`Are you sure you want to delete playlist "${name}"?`)) {
          delete playlists[name];
          localStorage.setItem('playlists', JSON.stringify(playlists));
          updatePlaylistsUI();
        }
      }

      function removeTrackFromPlaylist(playlistName, trackIndex) {
        playlists[playlistName].splice(trackIndex, 1);
        localStorage.setItem('playlists', JSON.stringify(playlists));
        updatePlaylistsUI();
      }

      function playPlaylistTrack(playlistName, index) {
        const track = playlists[playlistName][index];
        currentFavoriteIndex = -1; // reset favorites track skipping index context
        playSong(track.title, track.artist, track.artwork, track.genre);
      }

      // Add to playlist dropdown workflow
      addToPlaylistBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (currentTrack.title === 'Not Playing') return;
        
        const keys = Object.keys(playlists);
        if (keys.length === 0) {
          alert('Please create a playlist in the left dashboard first.');
          return;
        }

        playlistDropdown.innerHTML = keys.map(name => `
          <div class="playlist-dropdown-item" onclick="addCurrentToPlaylist('${name.replace(/'/g, "\\'")}')">Add to: ${name}</div>
        `).join('');
        playlistDropdown.classList.toggle('show');
      });

      function addCurrentToPlaylist(name) {
        const duplicate = playlists[name].some(t => t.title === currentTrack.title && t.artist === currentTrack.artist);
        if (duplicate) {
          alert('This song is already inside this playlist.');
          return;
        }
        playlists[name].push({ ...currentTrack });
        localStorage.setItem('playlists', JSON.stringify(playlists));
        playlistDropdown.classList.remove('show');
        updatePlaylistsUI();
      }

      document.addEventListener('click', () => {
        hideSearchResults();
        playlistDropdown.classList.remove('show');
      });
      
      // Global Native Micro Handlers
      document.querySelector('#backward10')?.addEventListener('click', () => {
        if (!player || !playerReady) return;
        player.seekTo(Math.max(0, player.getCurrentTime() - 10), true);
      });
      document.querySelector('#backward5')?.addEventListener('click', () => {
        if (!player || !playerReady) return;
        player.seekTo(Math.max(0, player.getCurrentTime() - 5), true);
      });
      document.querySelector('#forward5')?.addEventListener('click', () => {
        if (!player || !playerReady) return;
        player.seekTo(Math.min(player.getDuration(), player.getCurrentTime() + 5), true);
      });
      document.querySelector('#forward10')?.addEventListener('click', () => {
        if (!player || !playerReady) return;
        player.seekTo(Math.min(player.getDuration(), player.getCurrentTime() + 10), true);
      });
      
      const loopToggle = document.querySelector('#loopToggle');
      loopToggle.addEventListener('click', () => {
        isLooping = !isLooping;
        loopToggle.className = isLooping ? 'ri-repeat-one-line active-toggle' : 'ri-repeat-line';
      });
      
      window.addEventListener('DOMContentLoaded', () => {
        updateFavoritesList();
        updatePlaylistsUI();
        initPlayer();
      });
    </script>
  </body>
</html>
