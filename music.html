<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
      /* Embed Google Sans to align with global website design */
      @font-face {
        font-family: 'Google Sans';
        src: local('Google Sans'), local('GoogleSans'), url('https://fonts.gstatic.com/s/googlesans/v14/4UaGrENHsxJLGDu3lECnACYws0M7-Q.woff2') format('woff2');
      }

      :root {
        --bg-main: #f7f7f7;
        --card-bg: #ffffff;
        --text-main: #3c4043;
        --text-sub: #70757a;
        --border-color: #DADCE0;
        --accent-shadow: rgba(67, 71, 85, 0.27) 0px 0px 0.25em, rgba(90, 125, 188, 0.05) 0px 0.25em 1em;
        --button-bg: #EFEFEF;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        background-color: var(--bg-main);
        font-family: 'Google Sans', sans-serif;
        color: var(--text-main);
        padding: 20px;
        overflow-x: hidden;
      }

      /* Polished Search Bar matching .search-bar styles from UI */
      .search-container {
        width: 100%;
        max-width: 560px;
        margin-bottom: 25px;
        position: relative;
        z-index: 100;
      }

      .search-input {
        width: 100%;
        padding: 16px 16px 16px 50px; 
        background-color: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 35px;
        font-family: 'Google Sans', sans-serif;
        font-size: 15px;
        color: var(--text-main);
        outline: none;
        transition: box-shadow 0.2s ease, border-color 0.2s ease; 
      }

      .search-input::placeholder {
        color: var(--text-sub);
      }

      .search-input:hover,
      .search-input:focus {
        border-color: transparent;
        box-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
      }

      .search-icon-inside {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-sub);
        font-size: 18px;
        pointer-events: none;
      }

      /* Search Dropdown Layout Refresh */
      .search-results {
        width: 100%;
        max-width: 560px;
        max-height: 350px;
        background: var(--card-bg);
        border-radius: 16px;
        overflow-y: auto;
        opacity: 0;
        transform: translateY(-10px);
        visibility: hidden;
        transition: all 0.2s ease;
        z-index: 99;
        position: absolute;
        top: 65px;
        left: 0;
        box-shadow: 0 4px 12px rgba(32, 33, 36, 0.15);
        border: 1px solid var(--border-color);
      }

      .search-results.active {
        opacity: 1;
        transform: translateY(0);
        visibility: visible;
      }

      .result-item {
        display: flex;
        align-items: center;
        padding: 12px 18px;
        cursor: pointer;
        transition: background 0.2s ease;
      }

      .result-item:hover {
        background: var(--button-bg);
      }

      .result-img {
        width: 46px;
        height: 46px;
        border-radius: 8px;
        overflow: hidden;
        margin-right: 14px;
        flex-shrink: 0;
        border: 1px solid var(--border-color);
      }

      .result-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .result-info {
        flex: 1;
        min-width: 0;
      }

      .result-title {
        font-weight: 500;
        margin-bottom: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--text-main);
        font-size: 14px;
      }

      .result-artist {
        font-size: 13px;
        color: var(--text-sub);
      }

      /* Main Containers mapping back to your website's 1200px Grid layout */
      .main-container {
        display: flex;
        gap: 25px;
        width: 100%;
        max-width: 1200px;
        margin-top: 10px;
      }

      /* Main Music Player Card */
      .player {
        width: 65%;
        display: flex;
        align-items: center;
        gap: 30px;
        padding: 30px;
        background: var(--card-bg);
        border-radius: 16px;
        box-shadow: var(--accent-shadow);
        border: none;
        position: relative;
      }

      .album-art {
        flex: 0 0 220px;
        height: 220px;
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--button-bg);
        position: relative;
        border: 1px solid var(--border-color);
      }

      .album-art i {
        font-size: 80px;
        color: var(--text-sub);
        opacity: 0.4;
        position: absolute;
      }

      .album-art img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        position: relative;
        z-index: 1;
      }

      .info {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: relative;
        min-width: 0;
      }

      .top-icons {
        position: absolute;
        top: 0;
        right: 0;
      }

      .top-icons i {
        font-size: 18px;
        color: var(--text-sub);
        cursor: pointer;
        transition: color 0.2s;
      }

      .top-icons i:hover {
        color: #f4b400; /* Star yellow */
      }

      .track-title {
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 6px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--text-main);
      }

      .artist {
        font-size: 16px;
        color: var(--text-sub);
        margin-bottom: 25px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Control Deck Styling */
      .controls {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }

      .control-row {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .controls i {
        font-size: 16px;
        cursor: pointer;
        transition: all 0.2s ease;
        color: var(--text-main);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--button-bg);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .controls i:hover {
        background: #e0e0e0;
        box-shadow: rgba(0, 0, 0, 0.8) 0px 0px 0px 1px;
      }

      .controls i:active {
        transform: scale(0.95);
      }

      /* Highlighted Play Button */
      .controls i#playPause {
        background: var(--text-main);
        color: var(--card-bg);
        font-size: 16px;
        width: 46px;
        height: 46px;
      }
      .controls i#playPause:hover {
        background: #000000;
      }

      /* Custom Range Seekbar Element */
      .seekbar {
        height: 6px;
        background: var(--button-bg);
        border-radius: 6px;
        position: relative;
        cursor: pointer;
        transition: height 0.2s ease;
      }

      .seekbar:hover, .seekbar.active {
        height: 8px;
      }

      #progress {
        height: 100%;
        width: 0%;
        background: var(--text-main);
        border-radius: 6px;
      }

      .timecodes {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: var(--text-sub);
        margin-top: 6px;
      }

      /* Playlist Favorites Panel Layout */
      .favorites-column {
        width: 35%;
        background: var(--card-bg);
        border-radius: 16px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        box-shadow: var(--accent-shadow);
        max-height: 470px;
        overflow-y: auto;
      }

      .favorites-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-main);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }

      .play-favorites-btn {
        padding: 12px;
        font-size: 14px;
        font-weight: 500;
        background: var(--button-bg);
        border-radius: 25px;
        color: var(--text-main);
        cursor: pointer;
        text-align: center;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .play-favorites-btn:hover {
        background: #e0e0e0;
        box-shadow: rgba(0, 0, 0, 0.8) 0px 0px 0px 1px;
      }

      .favorite-item {
        display: flex;
        flex-direction: row;
        align-items: center;
        padding: 8px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s;
      }

      .favorite-item:hover {
        background: var(--button-bg);
      }

      .favorite-item .result-img {
        width: 38px;
        height: 38px;
        margin-right: 10px;
      }

      .favorite-item .result-title {
        font-size: 13px;
        font-weight: 500;
      }

      .favorite-item .result-artist {
        font-size: 11px;
      }

      .favorite-item .remove-fav,
      .favorite-item .skip-prev,
      .favorite-item .skip-next {
        font-size: 12px;
        color: var(--text-sub);
        opacity: 0.6;
        margin-left: 8px;
        padding: 4px;
      }

      .favorite-item .remove-fav:hover,
      .favorite-item .skip-prev:hover,
      .favorite-item .skip-next:hover {
        opacity: 1;
        color: var(--text-main);
      }

      /* Cleaned Interactive Lyrics Window */
      .lyrics-toggle {
        position: fixed;
        bottom: 110px; /* Offset cleanly above your main site frame navigation menu */
        left: 50%;
        transform: translateX(-50%);
        width: 48px;
        height: 48px;
        background: var(--card-bg);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: rgba(0,0,0,0.1) 0px 4px 12px;
        border: 1px solid var(--border-color);
        transition: all 0.2s ease;
        z-index: 100;
      }

      .lyrics-toggle:hover {
        box-shadow: rgba(0, 0, 0, 1) 0px 0px 0px 2px;
        background: var(--button-bg);
      }

      .lyrics-toggle i {
        font-size: 16px;
        color: var(--text-main);
      }

      .lyrics-info {
        flex: 1;
        display: none;
        flex-direction: column;
        justify-content: flex-start;
        min-width: 0;
      }

      .lyrics-content {
        max-height: 220px;
        overflow-y: auto;
        text-align: left;
        white-space: pre-line;
        padding-right: 10px;
        font-size: 15px;
        line-height: 1.6;
      }

      .lyric-line {
        transition: all 0.25s ease;
        color: var(--text-sub);
        opacity: 0.4;
        padding: 4px 0;
        font-size: 14px;
      }

      .lyric-line.active {
        color: var(--text-main);
        font-weight: 700;
        opacity: 1;
        font-size: 16px;
      }

      .lyric-line.next, .lyric-line.prev {
        opacity: 0.7;
      }

      /* Embedded Custom Scrollbar to match standard browsers */
      .favorites-column::-webkit-scrollbar,
      .search-results::-webkit-scrollbar,
      .lyrics-content::-webkit-scrollbar {
        width: 6px;
      }
      .favorites-column::-webkit-scrollbar-thumb,
      .search-results::-webkit-scrollbar-thumb,
      .lyrics-content::-webkit-scrollbar-thumb {
        background: #c1c1c1;
        border-radius: 10px;
      }

      #ytPlayer {
        position: absolute;
        top: 0;
        left: 0;
        width: 1px;
        height: 1px;
        opacity: 0.001;
      }

      .loading {
        text-align: center;
        padding: 15px;
        font-size: 13px;
        color: var(--text-sub);
      }

      .error-message {
        color: #d93025;
        text-align: center;
        padding: 15px;
        font-size: 13px;
      }
    </style>
  </head>

  <body>
    <div class="search-container">
      <i class="fa-solid fa-search search-icon-inside"></i>
      <input type="text" class="search-input" placeholder="Search for any song..." id="searchInput" />
      <div class="search-results" id="searchResults"></div>
    </div>

    <div class="main-container">
      <div class="player">
        <div class="album-art">
          <i class="fa-solid fa-music" id="musicIcon"></i>
          <img src="" alt="Album" id="albumCover" crossorigin="anonymous" style="display: none" />
        </div>
        <div class="info" id="playerInfo">
          <div class="top-icons">
            <i id="favoritesBtn" class="fa-solid fa-star"></i>
          </div>
          <div class="track-title" id="trackTitle">Not Playing</div>
          <div class="artist" id="artistName"></div>
          <div class="controls">
            <div class="control-row">
              <i id="backward10" class="fas fa-backward control-btn"></i>
              <i id="backward5" class="fa-solid fa-chevron-left control-btn"></i>
              <i id="playPause" class="fa-solid fa-play control-btn"></i>
              <i id="forward5" class="fa-solid fa-chevron-right control-btn"></i>
              <i id="forward10" class="fas fa-forward control-btn"></i>
            </div>
            <div class="control-row">
              <i id="loopToggle" class="fa-solid fa-repeat control-btn"></i>
              <i id="volumeBtn" class="fa-solid fa-volume-high control-btn"></i>
              <i id="favoriteBtn" class="fa-regular fa-heart control-btn"></i>
            </div>
          </div>
          <div id="seekbar" class="seekbar">
            <div id="progress"></div>
          </div>
          <div class="timecodes">
            <span id="currentTime">0:00</span>
            <span id="remainingTime">-0:00</span>
          </div>
        </div>
        <div class="lyrics-info" id="lyricsInfo">
          <div class="lyrics-content" id="lyricsContent"></div>
        </div>
      </div>

      <div class="favorites-column" id="favoritesColumn">
        <div class="favorites-title">Favorites</div>
        <div class="play-favorites-btn" id="playFavoritesBtn"><i class="fas fa-play"></i> Play Favorites</div>
      </div>
    </div>

    <div class="lyrics-toggle" id="lyricsToggle">
      <i class="fa-solid fa-align-left"></i>
    </div>

    <div id="player-container">
      <div id="ytPlayer"></div>
    </div>

    <script>
      const YT_KEY = 'AIzaSyBQpYqy6P7hBtUCoTPJCEVjZKx5BzB-ItU';
      const SEARCH_EP = 'https://itunes.apple.com/search?term=';
      const searchInput = document.querySelector('#searchInput');
      const searchResults = document.querySelector('#searchResults');
      const trackTitle = document.querySelector('#trackTitle');
      const artistName = document.querySelector('#artistName');
      const albumCover = document.querySelector('#albumCover');
      const musicIcon = document.querySelector('#musicIcon');
      const playPauseBtn = document.querySelector('#playPause');
      const volumeBtn = document.querySelector('#volumeBtn');
      const seekBar = document.querySelector('#seekbar');
      const progressBar = document.querySelector('#progress');
      const currentTimeSpan = document.querySelector('#currentTime');
      const remainingTimeSpan = document.querySelector('#remainingTime');
      const lyricsToggle = document.querySelector('#lyricsToggle');
      const playerInfo = document.querySelector('#playerInfo');
      const lyricsInfo = document.querySelector('#lyricsInfo');
      const lyricsContent = document.querySelector('#lyricsContent');
      const favoriteBtn = document.querySelector('#favoriteBtn');
      const favoritesBtn = document.querySelector('#favoritesBtn');
      const favoritesColumn = document.querySelector('#favoritesColumn');
      const playFavoritesBtn = document.querySelector('#playFavoritesBtn');
      let showingLyrics = false;
      let isMuted = false;
      let player = null;
      let isPlaying = false;
      let isDragging = false;
      let searchTimeout;
      let playerReady = false;
      let currentTrack = { title: 'Not Playing', artist: '', artwork: '', genre: '' };
      let isFavorite = false;
      let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
      let currentFavoriteIndex = -1;
      let isLooping = false;
      
      async function loadYouTubeAPI(retries = 3, delay = 2000) {
        return new Promise((resolve, reject) => {
          if (window.YT && window.YT.Player) {
            resolve();
            return;
          }
          const tag = document.createElement('script');
          tag.src = 'https://www.youtube.com/iframe_api';
          tag.onerror = () => {
            if (retries > 0) {
              setTimeout(() => loadYouTubeAPI(retries - 1, delay), delay);
            } else {
              reject(new Error('Failed to load YouTube API'));
            }
          };
          const firstScriptTag = document.getElementsByTagName('script')[0];
          firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
          window.onYouTubeIframeAPIReady = () => resolve();
        });
      }
      
      async function initPlayer() {
        try {
          await loadYouTubeAPI();
          player = new window.YT.Player('ytPlayer', {
            height: '1',
            width: '1',
            videoId: '',
            host: 'https://www.youtube-nocookie.com',
            playerVars: {
              playsinline: 1,
              enablejsapi: 1,
              modestbranding: 1,
              rel: 0,
              showinfo: 0,
              autoplay: 0 
            },
            events: {
              onReady: () => {
                playerReady = true;
                playPauseBtn.addEventListener('click', togglePlayback);
                volumeBtn.addEventListener('click', toggleMute);
                seekBar.addEventListener('mousedown', startSeek);
                document.addEventListener('mousemove', dragSeek);
                document.addEventListener('mouseup', endSeek);
                setInterval(updateProgress, 500);
              },
              onStateChange: (event) => {
                if (event.data === window.YT.PlayerState.PLAYING) {
                  isPlaying = true;
                  playPauseBtn.className = 'fa-solid fa-pause control-btn';
                } else if (event.data === window.YT.PlayerState.PAUSED || event.data === window.YT.PlayerState.ENDED) {
                  isPlaying = false;
                  playPauseBtn.className = 'fa-solid fa-play control-btn';
                }
                if (event.data === window.YT.PlayerState.ENDED && isLooping) {
                  player.seekTo(0);
                  player.playVideo();
                } else if (event.data === window.YT.PlayerState.ENDED && currentFavoriteIndex >= 0 && currentFavoriteIndex < favorites.length - 1) {
                  playNextFavorite();
                }
              },
              onError: (event) => {
                searchResults.innerHTML = '<div class="error-message">Failed to load video. Please try another song.</div>';
              }
            }
          });
        } catch (error) {
          searchResults.innerHTML = '<div class="error-message">Unable to initialize player. Please refresh the page.</div>';
        }
      }
      
      function toggleMute() {
        if (!player || !playerReady) return;
        if (isMuted) {
          player.unMute();
          volumeBtn.className = 'fa-solid fa-volume-high control-btn';
          isMuted = false;
        } else {
          player.mute();
          volumeBtn.className = 'fa-solid fa-volume-xmark control-btn';
          isMuted = true;
        }
      }
      
      searchInput.addEventListener('input', function () {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          const query = searchInput.value.trim();
          if (query.length > 1) {
            searchSongs(query);
          } else {
            hideSearchResults();
          }
        }, 500);
      });
      
      searchInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
          clearTimeout(searchTimeout);
          const query = searchInput.value.trim();
          if (query.length > 1) {
            searchSongs(query);
          }
        }
      });
      
      async function searchSongs(query) {
        searchResults.innerHTML = '<div class="loading">Searching...</div>';
        showSearchResults();
        const url = `${SEARCH_EP}${encodeURIComponent(query)}&media=music&limit=10`;
        try {
          const response = await fetch(url);
          const data = await response.json();
          displaySearchResults(data.results);
        } catch (error) {
          searchResults.innerHTML = '<div class="error-message">Search failed. Please try again.</div>';
        }
      }
      
      function displaySearchResults(results) {
        if (!results || results.length === 0) {
          searchResults.innerHTML = '<div class="loading">No results found</div>';
          return;
        }
        searchResults.innerHTML = '';
        results.forEach((item) => {
          if (!item.trackName || !item.artistName) return;
          const resultElement = document.createElement('div');
          resultElement.className = 'result-item';
          resultElement.innerHTML = `
            <div class="result-img">
              <img src="${item.artworkUrl100}" alt="${item.trackName}" crossorigin="anonymous">
            </div>
            <div class="result-info">
              <div class="result-title">${item.trackName}</div>
              <div class="result-artist">${item.artistName}</div>
            </div>
          `;
          resultElement.addEventListener('click', () => {
            playSong(item.trackName, item.artistName, item.artworkUrl100, item.primaryGenreName);
            hideSearchResults();
            searchInput.value = '';
            currentFavoriteIndex = -1;
          });
          searchResults.appendChild(resultElement);
        });
      }
      
      function showSearchResults() {
        searchResults.classList.add('active');
      }
      
      function hideSearchResults() {
        searchResults.classList.remove('active');
      }
      
      function playSong(title, artist, artwork, genre = '') {
        trackTitle.textContent = title;
        artistName.textContent = artist;
        albumCover.src = artwork.replace('100x100', '600x600');
        albumCover.style.display = 'block';
        musicIcon.style.display = 'none';
        if (showingLyrics) {
          fetchLyrics(artist, title);
        }
        currentTrack = { title, artist, artwork, genre };
        localStorage.setItem('lastPlayed', JSON.stringify(currentTrack));
        isFavorite = favorites.some((fav) => fav.title === title && fav.artist === artist);
        favoriteBtn.className = isFavorite ? 'fa-solid fa-heart control-btn' : 'fa-regular fa-heart control-btn';
        
        isPlaying = false;
        playPauseBtn.className = 'fa-solid fa-play control-btn';
        
        const searchQuery = `${title} ${artist}`;
        getYT(searchQuery);
      }
      
      function getYT(query) {
        const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&key=${YT_KEY}&type=video&maxResults=1`;
        fetch(url)
          .then((response) => response.json())
          .then((data) => {
            if (data.items && data.items.length > 0) {
              const videoId = data.items[0].id.videoId;
              loadVid(videoId);
            } else {
              searchResults.innerHTML = '<div class="error-message">No YouTube results found</div>';
            }
          })
          .catch((error) => {
            searchResults.innerHTML = '<div class="error-message">Failed to search YouTube. Please try again.</div>';
          });
      }
      
      function loadVid(videoId) {
        if (player && playerReady && player.loadVideoById) {
          player.loadVideoById(videoId);
          isPlaying = false;
          playPauseBtn.className = 'fa-solid fa-play control-btn';
        } else {
          initPlayer().then(() => {
            if (player && playerReady && player.loadVideoById) {
              player.loadVideoById(videoId);
              isPlaying = false;
              playPauseBtn.className = 'fa-solid fa-play control-btn';
            } else {
              searchResults.innerHTML = '<div class="error-message">Unable to initialize player. Please refresh the page.</div>';
            }
          });
        }
      }
      
      lyricsToggle.addEventListener('click', function () {
        showingLyrics = !showingLyrics;
        if (showingLyrics) {
          playerInfo.style.display = 'none';
          albumCover.style.display = 'none';
          musicIcon.style.display = 'none';
          lyricsInfo.style.display = 'flex';
          fetchLyrics(currentTrack.artist, currentTrack.title);
        } else {
          playerInfo.style.display = 'flex';
          albumCover.style.display = currentTrack.title === 'Not Playing' ? 'none' : 'block';
          musicIcon.style.display = currentTrack.title === 'Not Playing' ? 'block' : 'none';
          lyricsInfo.style.display = 'none';
        }
      });
      
      async function fetchLyrics(artist, title) {
        lyricsContent.textContent = 'Loading lyrics...';
        const cleanArtist = encodeURIComponent(artist.trim());
        const cleanTitle = encodeURIComponent(title.trim());
        try {
          const response = await fetch(`https://lrclib.net/api/get?artist_name=${cleanArtist}&track_name=${cleanTitle}`);
          if (!response.ok) throw new Error('Lyrics not found');
          const data = await response.json();
          if (data.syncedLyrics) {
            const lines = data.syncedLyrics
              .trim()
              .split('\n')
              .map((line) => {
                const match = line.match(/^\[(\d+):(\d+\.\d+)](.*)$/);
                if (match) {
                  const time = parseInt(match[1], 10) * 60 + parseFloat(match[2]);
                  const text = match[3].trim();
                  return { time, text };
                }
                return null;
              })
              .filter(Boolean);
            lyricsContent.innerHTML = lines
              .map((line, index) => `<div class="lyric-line" data-time="${line.time}" id="lyric-${index}">${line.text}</div>`)
              .join('');
            if (window.lyricsSyncInterval) clearInterval(window.lyricsSyncInterval);
            window.lyricsSyncInterval = setInterval(() => {
              const currentTime = player && playerReady && player.getCurrentTime ? player.getCurrentTime() : 0;
              let activeIndex = -1;
              for (let i = 0; i < lines.length; i++) {
                if (currentTime >= lines[i].time) {
                  activeIndex = i;
                } else {
                  break;
                }
              }
              document.querySelectorAll('.lyric-line').forEach((el, i) => {
                el.classList.remove('active', 'prev', 'next');
                if (i === activeIndex) {
                  el.classList.add('active');
                  lyricsContent.scrollTo({
                    top: el.offsetTop - lyricsContent.clientHeight / 2 + el.clientHeight / 2,
                    behavior: 'smooth'
                  });
                } else if (i === activeIndex - 1) {
                  el.classList.add('prev');
                } else if (i === activeIndex + 1) {
                  el.classList.add('next');
                }
              });
            }, 300);
          } else if (data.lyrics) {
            const formattedLyrics = data.lyrics.replace(/\n/g, '<br>');
            lyricsContent.innerHTML = formattedLyrics;
          } else {
            lyricsContent.textContent = 'No lyrics available.';
          }
        } catch (error) {
          lyricsContent.textContent = 'No lyrics available.';
        }
      }
      
      function togglePlayback() {
        if (!player || !playerReady) return;
        if (isPlaying) {
          player.pauseVideo();
        } else {
          player.playVideo();
        }
      }
      
      function startSeek(e) {
        if (!player || !playerReady) return;
        isDragging = true;
        seekBar.classList.add('active');
        updateSeekPosition(e);
      }
      
      function dragSeek(e) {
        if (isDragging) updateSeekPosition(e);
      }
      
      function endSeek() {
        if (isDragging) {
          isDragging = false;
          seekBar.classList.remove('active');
        }
      }
      
      function updateSeekPosition(e) {
        if (!player || !playerReady || !player.getDuration) return;
        const rect = seekBar.getBoundingClientRect();
        const position = (e.clientX - rect.left) / rect.width;
        const percent = Math.min(Math.max(position, 0), 1);
        progressBar.style.width = percent * 100 + '%';
        const duration = player.getDuration();
        player.seekTo(percent * duration, true);
      }
      
      function updateProgress() {
        if (!player || !playerReady || !player.getDuration || isDragging) return;
        try {
          const duration = player.getDuration() || 0;
          const currentTime = player.getCurrentTime() || 0;
          const percent = (currentTime / duration) * 100;
          progressBar.style.width = percent + '%';
          currentTimeSpan.textContent = formatTime(currentTime);
          remainingTimeSpan.textContent = '-' + formatTime(duration - currentTime);
        } catch (error) {}
      }
      
      function formatTime(seconds) {
        const minutes = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60)
          .toString()
          .padStart(2, '0');
        return `${minutes}:${secs}`;
      }
      
      document.addEventListener('click', function (e) {
        if (!searchResults.contains(e.target) && e.target !== searchInput) {
          hideSearchResults();
        }
      });
      
      function minustenseconds() {
        if (!player || !playerReady || !player.getCurrentTime || !player.getDuration) return;
        const currentTime = player.getCurrentTime();
        const newTime = Math.max(0, currentTime - 10);
        player.seekTo(newTime, true);
      }
      
      function minusfiveseconds() {
        if (!player || !playerReady || !player.getCurrentTime || !player.getDuration) return;
        const currentTime = player.getCurrentTime();
        const newTime = Math.max(0, currentTime - 5);
        player.seekTo(newTime, true);
      }
      
      function plusfiveseconds() {
        if (!player || !playerReady || !player.getCurrentTime || !player.getDuration) return;
        const currentTime = player.getCurrentTime();
        const duration = player.getDuration();
        const newTime = Math.min(currentTime + 5, duration);
        player.seekTo(newTime, true);
      }
      
      function plustenseconds() {
        if (!player || !playerReady || !player.getCurrentTime || !player.getDuration) return;
        const currentTime = player.getCurrentTime();
        const duration = player.getDuration();
        const newTime = Math.min(currentTime + 10, duration);
        player.seekTo(newTime, true);
      }
      
      favoriteBtn.addEventListener('click', () => {
        if (favorites.length >= 10 && !isFavorite) {
          alert('Maximum 10 favorites allowed!');
          return;
        }
        const track = { title: currentTrack.title, artist: currentTrack.artist, artwork: currentTrack.artwork, genre: currentTrack.genre };
        if (isFavorite) {
          favorites = favorites.filter((fav) => fav.title !== track.title || fav.artist !== track.artist);
        } else {
          favorites.push(track);
        }
        localStorage.setItem('favorites', JSON.stringify(favorites));
        isFavorite = !isFavorite;
        favoriteBtn.className = isFavorite ? 'fa-solid fa-heart control-btn' : 'fa-regular fa-heart control-btn';
        updateFavorites();
      });
      
      function updateFavorites() {
        favoritesColumn.innerHTML = `
          <div class="favorites-title">Favorites</div>
          <div class="play-favorites-btn" id="playFavoritesBtn"><i class="fas fa-play"></i> Play Favorites</div>
          ${favorites
            .map(
              (fav) => `
            <div class="favorite-item" onclick="playSong('${fav.title.replace(/'/g, "\\'")}', '${fav.artist.replace(/'/g, "\\'")}', '${fav.artwork}', '${fav.genre}');currentFavoriteIndex=${favorites.findIndex((f) => f.title === fav.title && f.artist === fav.artist)}">
              <div class="result-img"><img src="${fav.artwork.replace('100x100', '600x600')}" alt="${fav.title}"></div>
              <div class="result-info">
                <div class="result-title">${fav.title}</div>
                <div class="result-artist">${fav.artist}</div>
              </div>
              <i class="fa-solid fa-times remove-fav" onclick="event.stopPropagation();removeFavorite('${fav.title.replace(/'/g, "\\'")}', '${fav.artist.replace(/'/g, "\\'")}')"></i>
              <i class="fa-solid fa-step-backward skip-prev" onclick="event.stopPropagation();skipFavoritePrev('${fav.title.replace(/'/g, "\\'")}', '${fav.artist.replace(/'/g, "\\'")}')"></i>
              <i class="fa-solid fa-step-forward skip-next" onclick="event.stopPropagation();skipFavoriteNext('${fav.title.replace(/'/g, "\\'")}', '${fav.artist.replace(/'/g, "\\'")}')"></i>
            </div>
          `
            )
            .join('')}
        `;
        const newPlayFavoritesBtn = document.querySelector('#playFavoritesBtn');
        if (newPlayFavoritesBtn) {
          newPlayFavoritesBtn.addEventListener('click', playFavorites);
        }
      }
      
      function removeFavorite(title, artist) {
        favorites = favorites.filter((fav) => fav.title !== title || fav.artist !== artist);
        localStorage.setItem('favorites', JSON.stringify(favorites));
        if (currentFavoriteIndex >= favorites.length) {
          currentFavoriteIndex = -1;
        }
        updateFavorites();
      }
      
      function skipFavoritePrev(title, artist) {
        const index = favorites.findIndex((fav) => fav.title === title && fav.artist === artist);
        if (index > 0) {
          currentFavoriteIndex = index - 1;
        } else {
          currentFavoriteIndex = favorites.length - 1;
        }
        if(favorites[currentFavoriteIndex]) {
          playSong(favorites[currentFavoriteIndex].title, favorites[currentFavoriteIndex].artist, favorites[currentFavoriteIndex].artwork, favorites[currentFavoriteIndex].genre);
        }
      }
      
      function skipFavoriteNext(title, artist) {
        const index = favorites.findIndex((fav) => fav.title === title && fav.artist === artist);
        if (index < favorites.length - 1) {
          currentFavoriteIndex = index + 1;
        } else {
          currentFavoriteIndex = 0;
        }
        if(favorites[currentFavoriteIndex]) {
          playSong(favorites[currentFavoriteIndex].title, favorites[currentFavoriteIndex].artist, favorites[currentFavoriteIndex].artwork, favorites[currentFavoriteIndex].genre);
        }
      }
      
      function playFavorites() {
        if (favorites.length === 0) return;
        currentFavoriteIndex = 0;
        playSong(favorites[0].title, favorites[0].artist, favorites[0].artwork, favorites[0].genre);
      }
      
      function playNextFavorite() {
        if (currentFavoriteIndex < favorites.length - 1) {
          currentFavoriteIndex++;
        } else {
          currentFavoriteIndex = 0;
        }
        if(favorites[currentFavoriteIndex]) {
          playSong(favorites[currentFavoriteIndex].title, favorites[currentFavoriteIndex].artist, favorites[currentFavoriteIndex].artwork, favorites[currentFavoriteIndex].genre);
        }
      }
      
      window.addEventListener('DOMContentLoaded', () => {
        document.querySelector('#backward10')?.addEventListener('click', minustenseconds);
        document.querySelector('#backward5')?.addEventListener('click', minusfiveseconds);
        document.querySelector('#forward5')?.addEventListener('click', plusfiveseconds);
        document.querySelector('#forward10')?.addEventListener('click', plustenseconds);
        
        const loopToggle = document.querySelector('#loopToggle');
        loopToggle.addEventListener('click', () => {
          isLooping = !isLooping;
          loopToggle.className = isLooping ? 'fa-solid fa-repeat-1 control-btn' : 'fa-solid fa-repeat control-btn';
        });
        
        isPlaying = false;
        playPauseBtn.className = 'fa-solid fa-play control-btn';
        
        updateFavorites();
        initPlayer();
      });
    </script>
  </body>
</html>
